name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  client:
    name: Build user-mode client (MSVC x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC dev env
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Compile client.exe
        shell: cmd
        working-directory: client
        run: cl /nologo /EHsc /W3 /O2 /std:c++17 client.cpp /link /OUT:client.exe

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-x64
          path: client/client.exe
